tools:
  - name: search_game_icons
    description: Search official Game-Icons.net SVG paths and return attribution metadata.
    source_file: scripts/search_game_icons.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: game-icons
    input_schema:
      type: object
      required: [query]
      properties:
        query: {type: string, minLength: 1}
        limit: {type: integer, minimum: 1, maximum: 100, default: 20}
    output_schema:
      type: object

  - name: download_game_icon
    description: Download one verified Game-Icons.net SVG and return a validated AssetDescriptor.
    source_file: scripts/download_game_icon.py
    execution: sync
    affinity: any
    timeout_hint_secs: 60
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: game-icons
    input_schema:
      type: object
      required: [icon_path, output_dir]
      properties:
        icon_path: {type: string, minLength: 1}
        output_dir: {type: string, minLength: 1}
    output_schema:
      type: object
      required: [asset_descriptor]
      properties:
        asset_descriptor:
          type: object
          required: [asset_id, variants, attribution]
          properties:
            asset_id: {type: string}
            variants:
              type: array
              minItems: 1
              items:
                type: object
                required: [local_path, format]
            attribution:
              type: object
              required: [source_url, license_spdx, author, attribution_text]
