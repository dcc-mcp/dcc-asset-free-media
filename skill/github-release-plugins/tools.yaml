tools:
  - name: inspect_github_plugin_release
    description: Inspect a public licensed GitHub repository and list its latest release assets.
    source_file: scripts/inspect_github_plugin_release.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: github-plugins
    input_schema:
      type: object
      required: [repository]
      properties:
        repository: {type: string, description: "GitHub owner/name"}
    output_schema:
      type: object

  - name: download_github_plugin_release_asset
    description: Download one inspected GitHub release asset and return source, license, size, and SHA-256 metadata.
    source_file: scripts/download_github_plugin_release_asset.py
    execution: sync
    affinity: any
    timeout_hint_secs: 300
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: github-plugins
    input_schema:
      type: object
      required: [repository, asset_id, output_dir]
      properties:
        repository: {type: string}
        asset_id: {type: integer, minimum: 1}
        output_dir: {type: string}
    output_schema:
      type: object
      required: [plugin_package]
      properties:
        plugin_package:
          type: object
          required: [local_path, source_url, license_spdx, sha256]
