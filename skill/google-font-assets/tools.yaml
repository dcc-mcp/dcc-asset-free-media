tools:
  - name: search_google_fonts
    description: Search the official Google Fonts Developer API by family name, category, or subset.
    source_file: scripts/search_google_fonts.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: google-fonts
    input_schema:
      type: object
      properties:
        query: {type: string, default: ""}
        category: {type: string}
        subset: {type: string}
        limit: {type: integer, minimum: 1, maximum: 100, default: 20}
    output_schema:
      type: object

  - name: download_google_font
    description: Download one Google Fonts family variant and its license, returning a validated AssetDescriptor.
    source_file: scripts/download_google_font.py
    execution: sync
    affinity: any
    timeout_hint_secs: 60
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: google-fonts
    input_schema:
      type: object
      required: [family, output_dir]
      properties:
        family: {type: string, minLength: 1}
        output_dir: {type: string, minLength: 1}
        variant: {type: string, default: regular}
    output_schema:
      type: object
      required: [asset_descriptor]
      properties:
        asset_descriptor:
          type: object
          required: [asset_id, variants, attribution]
          properties:
            asset_id: {type: string}
            variants:
              type: array
              minItems: 1
              items:
                type: object
                required: [local_path, format]
            attribution:
              type: object
              required: [source_url, license_spdx]
