tools:
  - name: search_pexels_videos
    description: Search the official Pexels API for free stock videos and return source and license metadata.
    source_file: scripts/search_pexels_videos.py
    execution: sync
    affinity: any
    timeout_hint_secs: 30
    enforce_thread_affinity: true
    annotations:
      read_only_hint: true
      idempotent_hint: true
      open_world_hint: true
    group: pexels
    input_schema:
      type: object
      required: [query]
      properties:
        query: {type: string}
        orientation: {type: string, enum: [landscape, portrait, square]}
        size: {type: string, enum: [large, medium, small]}
        limit: {type: integer, minimum: 1, maximum: 80, default: 10}
    output_schema:
      type: object

  - name: download_pexels_video
    description: Download one Pexels video variant and return a validated AssetDescriptor.
    source_file: scripts/download_pexels_video.py
    execution: sync
    affinity: any
    timeout_hint_secs: 180
    enforce_thread_affinity: true
    annotations:
      read_only_hint: false
      destructive_hint: false
      idempotent_hint: false
      open_world_hint: true
    group: pexels
    input_schema:
      type: object
      required: [video_id, output_dir]
      properties:
        video_id: {type: integer, minimum: 1}
        output_dir: {type: string}
        max_width: {type: integer, minimum: 1, default: 1920}
    output_schema:
      type: object
      required: [asset_descriptor]
      properties:
        asset_descriptor:
          type: object
          required: [asset_id, variants, attribution]
          properties:
            asset_id: {type: string}
            variants:
              type: array
              minItems: 1
              items:
                type: object
                required: [local_path, format]
            attribution:
              type: object
              required: [source_url, license_text]

